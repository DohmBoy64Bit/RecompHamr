name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Verify baseline
        shell: pwsh
        run: ./scripts/verify.ps1
